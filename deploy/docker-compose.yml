version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: hookbridge-mongodb
    ports:
      - "27017:27017"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: hookbridge-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: hookbridge-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.14.3
    container_name: hookbridge-apm-server
    command: >
      apm-server -e
      -E apm-server.host=0.0.0.0:8200
      -E output.elasticsearch.hosts=["elasticsearch:9200"]
      -E apm-server.kibana.enabled=true
      -E apm-server.kibana.host=kibana:5601
    ports:
      - "8200:8200"
    depends_on:
      - elasticsearch
      - kibana

  hookbridge-api:
    image: hookbridge-api:latest
    build:
      context: ..
      dockerfile: src/HookBridge.Api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - elasticsearch
      - apm-server

  hookbridge-worker:
    image: hookbridge-worker:latest
    build:
      context: ..
      dockerfile: src/HookBridge.Worker/Dockerfile
    depends_on:
      - mongodb
      - elasticsearch
      - apm-server
