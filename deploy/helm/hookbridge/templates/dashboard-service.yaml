apiVersion: v1
kind: Service
metadata:
  name: {{ include "hookbridge.dashboardName" . }}
  labels:
    {{- include "hookbridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: {{ .Values.dashboard.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "hookbridge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
