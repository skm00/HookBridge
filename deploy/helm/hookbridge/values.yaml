nameOverride: ""
fullnameOverride: ""

api:
  replicaCount: 2
  image:
    repository: ghcr.io/hookbridge/api
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  replicaCount: 2
  image:
    repository: ghcr.io/hookbridge/worker
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

dashboard:
  replicaCount: 2
  image:
    repository: ghcr.io/hookbridge/dashboard
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  env:
    viteApiBaseUrl: "https://api.hookbridge.local"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

config:
  aspnetcoreEnvironment: "Production"
  mongodb:
    databaseName: "hookbridge"
    connectionString: "mongodb://mongo:27017"
  kafka:
    bootstrapServers: "kafka:9092"
  elastic:
    elasticsearchUrl: "http://elasticsearch:9200"
    environment: "production"
  elasticApm:
    serverUrl: "http://apm-server:8200"
    enabled: "true"
  security:
    allowPrivateNetworkTargetUrls: "false"

secrets:
  stripe:
    secretKey: "replace-me"
    webhookSecret: "replace-me"
  jwt:
    secret: "replace-me"

ingress:
  enabled: true
  className: ""
  host: hookbridge.local
  annotations: {}
  tls:
    enabled: false
    secretName: ""

autoscaling:
  api:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  worker:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
