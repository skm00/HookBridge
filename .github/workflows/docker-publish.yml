name: Docker Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Required for GHCR publishes with the automatic GITHUB_TOKEN.
# contents: read allows checkout; packages: write allows pushing images to ghcr.io.
permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: skm00

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: hookbridge-api
            dockerfile: ./src/HookBridge.Api/Dockerfile
            context: .
            cache-scope: hookbridge-api
          - image: hookbridge-worker
            dockerfile: ./src/HookBridge.Worker/Dockerfile
            context: .
            cache-scope: hookbridge-worker
          - image: hookbridge-dashboard
            dockerfile: ./src/HookBridge.Dashboard/Dockerfile
            context: ./src/HookBridge.Dashboard
            cache-scope: hookbridge-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use a stable per-image scope so cache entries are reused across runs
      # instead of multiplying by branch or tag. mode=min exports only the layers
      # needed for future builds, preventing unbounded Buildx cache growth.
      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/skm00/HookBridge
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=min

      # Remove local Docker layers after the remote cache has been exported. This
      # keeps Ubuntu runners lean during matrix builds and prevents unused layers
      # from accumulating across subsequent Docker steps in the same job.
      - name: Clean up unused Docker layers
        if: always()
        run: docker system prune -af
