name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore HookBridge.sln

    - name: Install coverage and Sonar tools
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        dotnet tool install --global dotnet-sonarscanner

    - name: Begin Sonar scan
      if: ${{ secrets.SONAR_TOKEN != '' }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      run: |
        dotnet sonarscanner begin \
          /k:"${SONAR_PROJECT_KEY:-HookBridge}" \
          /o:"${SONAR_ORGANIZATION:-hookbridge}" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="coverage/OpenCover.xml" \
          /d:sonar.coverage.exclusions="**/Program.cs,**/Migrations/**/*.cs,**/bin/**,**/obj/**"

    - name: Build
      run: dotnet build HookBridge.sln --configuration Release --no-restore

    - name: Test with coverage
      run: dotnet test HookBridge.sln --configuration Release --no-build --settings coverlet.runsettings --collect:"XPlat Code Coverage" --logger "console;verbosity=normal" --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

    - name: Generate coverage reports
      run: |
        reportgenerator \
          -reports:"TestResults/**/coverage.cobertura.xml" \
          -targetdir:"coverage" \
          -reporttypes:"Cobertura;OpenCover;MarkdownSummaryGithub" \
          -assemblyfilters:"+HookBridge.*;-*.Tests"
        cat coverage/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

    - name: Enforce 80 percent coverage gate
      run: ./scripts/enforce-coverage-threshold.sh coverage/Cobertura.xml 80

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: hookbridge-coverage
        path: |
          coverage
          TestResults

    - name: End Sonar scan
      if: ${{ secrets.SONAR_TOKEN != '' }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
