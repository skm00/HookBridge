name: .NET CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 8.0.x
  CONFIGURATION: Release
  SOLUTION_FILE: HookBridge.sln
  UNIT_TEST_PROJECT: tests/HookBridge.AI.Worker.Tests/HookBridge.AI.Worker.Tests.csproj
  INTEGRATION_TEST_PROJECT: tests/HookBridge.AI.Worker.IntegrationTests/HookBridge.AI.Worker.IntegrationTests.csproj
  TEST_RESULTS_DIR: ./TestResults
  COVERAGE_REPORT_DIR: ./CoverageReport
  COVERAGE_LINE_THRESHOLD: 80
  COVERAGE_BRANCH_THRESHOLD: 70
  SKIP_INTEGRATION_TESTS: ${{ vars.SKIP_INTEGRATION_TESTS || 'false' }}
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-test-coverage:
    name: Build, test, and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet package cache
        id: nuget-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.sln', '**/*.csproj', '**/*.props', '**/*.targets', '**/NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_FILE"

      - name: Save NuGet package cache
        if: github.ref == 'refs/heads/main' && steps.nuget-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ steps.nuget-cache.outputs.cache-primary-key }}

      - name: Build solution
        run: dotnet build "$SOLUTION_FILE" --configuration "$CONFIGURATION" --no-restore --verbosity minimal -m:1


      - name: Run existing non-AI test projects
        shell: bash
        run: |
          for test_project in \
            tests/HookBridge.Api.Tests/HookBridge.Api.Tests.csproj \
            tests/HookBridge.Application.Tests/HookBridge.Application.Tests.csproj \
            tests/HookBridge.Worker.Tests/HookBridge.Worker.Tests.csproj; do
            dotnet test "$test_project" \
              --configuration "$CONFIGURATION" \
              --no-build \
              --logger "trx;LogFilePrefix=$(basename "$test_project" .csproj)" \
              --results-directory "$TEST_RESULTS_DIR/Existing" \
              --verbosity normal
          done

      - name: Run unit tests with coverage
        shell: bash
        run: |
          dotnet test "$UNIT_TEST_PROJECT" \
            --configuration "$CONFIGURATION" \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --logger "trx;LogFilePrefix=hookbridge-ai-worker-unit-tests" \
            --results-directory "$TEST_RESULTS_DIR/Unit" \
            --verbosity normal

      - name: Verify Docker for Testcontainers
        if: env.SKIP_INTEGRATION_TESTS != 'true'
        shell: bash
        run: |
          docker version
          docker info

      - name: Run integration tests with coverage
        if: env.SKIP_INTEGRATION_TESTS != 'true'
        shell: bash
        run: |
          dotnet test "$INTEGRATION_TEST_PROJECT" \
            --configuration "$CONFIGURATION" \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --logger "trx;LogFilePrefix=hookbridge-ai-worker-integration-tests" \
            --results-directory "$TEST_RESULTS_DIR/Integration" \
            --verbosity normal

      - name: Skip integration tests notice
        if: env.SKIP_INTEGRATION_TESTS == 'true'
        run: echo "SKIP_INTEGRATION_TESTS=true; integration tests were skipped."

      - name: Install coverage report generator
        if: always()
        shell: bash
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Generate code coverage report
        if: always()
        shell: bash
        run: |
          if find "$TEST_RESULTS_DIR/Unit" -name 'coverage.cobertura.xml' -print -quit | grep -q .; then
            reportgenerator \
              -reports:"$TEST_RESULTS_DIR/Unit/**/coverage.cobertura.xml" \
              -targetdir:"$COVERAGE_REPORT_DIR" \
              -reporttypes:"Html;Cobertura;MarkdownSummaryGithub;TextSummary"
          else
            echo "::error::No unit coverage.cobertura.xml files were found under $TEST_RESULTS_DIR/Unit."
            exit 1
          fi

      - name: Add coverage summary to job summary
        if: always()
        shell: bash
        run: |
          if [ -f "$COVERAGE_REPORT_DIR/SummaryGithub.md" ]; then
            cat "$COVERAGE_REPORT_DIR/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "$COVERAGE_REPORT_DIR/Summary.txt" ]; then
            {
              echo ""
              echo "### Coverage text summary"
              echo '```text'
              cat "$COVERAGE_REPORT_DIR/Summary.txt"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo ""
            echo "Coverage artifact: \`hookbridge-coverage-report\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hookbridge-coverage-report
          path: ./CoverageReport
          if-no-files-found: error
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hookbridge-test-results
          path: ./TestResults
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce coverage thresholds
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          coverage_file = pathlib.Path(os.environ["COVERAGE_REPORT_DIR"]) / "Cobertura.xml"
          line_threshold = float(os.environ["COVERAGE_LINE_THRESHOLD"])
          branch_threshold = float(os.environ["COVERAGE_BRANCH_THRESHOLD"])

          if not coverage_file.exists():
              print(f"Coverage file not found: {coverage_file}", file=sys.stderr)
              sys.exit(1)

          root = ET.parse(coverage_file).getroot()
          line_rate = float(root.attrib.get("line-rate", "0")) * 100
          branch_rate = float(root.attrib.get("branch-rate", "0")) * 100

          print(f"Line coverage: {line_rate:.2f}%")
          print(f"Branch coverage: {branch_rate:.2f}%")
          print(f"Required line coverage: {line_threshold:.2f}%")
          print(f"Required branch coverage: {branch_threshold:.2f}%")

          failures = []
          if line_rate < line_threshold:
              failures.append(
                  f"Line coverage {line_rate:.2f}% is below the required {line_threshold:.2f}% threshold."
              )
          if branch_rate < branch_threshold:
              failures.append(
                  f"Branch coverage {branch_rate:.2f}% is below the required {branch_threshold:.2f}% threshold."
              )

          if failures:
              for failure in failures:
                  print(failure, file=sys.stderr)
              sys.exit(1)
          PY
