name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test with Coverlet collector
      run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory TestResults --logger "trx;LogFilePrefix=hookbridge-tests" --blame-hang --blame-hang-timeout 2m

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"TestResults/CoverageReport" -reporttypes:"HtmlInline_AzurePipelines;Cobertura;TextSummary"

    - name: Enforce 75 percent coverage
      shell: bash
      run: |
        python3 - <<'PY'
        import pathlib
        import sys
        import xml.etree.ElementTree as ET

        coverage_file = pathlib.Path("TestResults/CoverageReport/Cobertura.xml")
        if not coverage_file.exists():
            print(f"Coverage file not found: {coverage_file}", file=sys.stderr)
            sys.exit(1)

        root = ET.parse(coverage_file).getroot()
        line_rate = float(root.attrib.get("line-rate", "0")) * 100
        branch_rate = float(root.attrib.get("branch-rate", "0")) * 100
        print(f"Line coverage: {line_rate:.2f}%")
        print(f"Branch coverage: {branch_rate:.2f}%")

        if line_rate < 75:
            print(f"Line coverage {line_rate:.2f}% is below the required 75% threshold.", file=sys.stderr)
            sys.exit(1)
        PY

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: TestResults/CoverageReport
